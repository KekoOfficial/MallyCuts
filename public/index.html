<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MallyCuts - Sistema Profesional</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">⚙️</div>
            <h1>MALLYCUTS</h1>
            <p>Sistema automatizado de edición y envío</p>
        </header>

        <div class="tabs">
            <button id="btnArchivo" class="tab-btn active">
                📁 SUBIR VIDEO
            </button>
            <button id="btnEnlace" class="tab-btn">
                🔗 DESCARGAR
            </button>
        </div>

        <main>
            <!-- SECCIÓN SUBIR ARCHIVO -->
            <div id="seccionArchivo" class="tab-content active">
                <form id="formularioArchivo" enctype="multipart/form-data">
                    
                    <div class="form-group">
                        <label for="titulo">📝 Título del Video</label>
                        <input type="text" id="titulo" name="titulo" placeholder="Ej: Serie Completa - Episodio 1" required>
                    </div>

                    <div class="form-group">
                        <label>🎬 Seleccionar Archivo</label>
                        <label class="file-upload">
                            <input type="file" id="video" name="archivo_video" accept="video/*" required>
                            <span id="file-text">Click para seleccionar un video</span>
                        </label>
                    </div>

                    <button type="submit" class="btn-submit">
                        🚀 INICIAR PROCESO
                    </button>
                </form>
            </div>

            <!-- SECCIÓN DESCARGA -->
            <div id="seccionEnlace" class="tab-content">
                <div class="redirect-card">
                    <h2>🔗 Módulo de Descargas</h2>
                    <p>Para descargar videos desde internet usa la página especial:</p>
                    <a href="/descarga.html" class="btn-link">📥 IR A DESCARGAS</a>
                </div>
            </div>

            <div id="resultado" class="resultado"></div>
        </main>
    </div>

    <script src="/index.js"></script>
</body>
</html>
