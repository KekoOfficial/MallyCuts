<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MallyCuts - Sistema Profesional</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ MALLYCUTS</h1>
            <p>Sistema automatizado de edición y envío</p>
        </header>

        <!-- 🎛️ PANEL DE OPCIONES -->
        <div class="opciones-panel">
            <button id="btnArchivo" class="boton-opcion activo">
                📁 SUBIR VIDEO
            </button>
            <button id="btnEnlace" class="boton-opcion">
                🔗 ENLACE / LINK
            </button>
        </div>

        <main>
            <!-- 📂 SECCIÓN: SUBIR ARCHIVO -->
            <div id="seccionArchivo" class="seccion-formulario">
                <form id="formularioArchivo" enctype="multipart/form-data">
                    
                    <div class="input-group">
                        <label for="titulo">📝 Título del Video</label>
                        <input type="text" id="titulo" name="titulo" placeholder="Ej: Serie Completa - Episodio 1" required>
                    </div>

                    <div class="input-group">
                        <label for="video">🎬 Seleccionar Archivo</label>
                        <div class="file-input">
                            <input type="file" id="video" name="archivo_video" accept="video/*" required>
                            <span id="file-label">Ningún archivo seleccionado</span>
                        </div>
                    </div>

                    <button type="submit" class="btn-procesar">
                        🚀 INICIAR PROCESO
                    </button>
                </form>
            </div>

            <!-- 🔗 SECCIÓN: PEGAR ENLACE -->
            <div id="seccionEnlace" class="seccion-formulario" style="display: none;">
                <form id="formularioEnlace">
                    
                    <div class="input-group">
                        <label for="tituloEnlace">📝 Título del Video</label>
                        <input type="text" id="tituloEnlace" name="titulo" placeholder="Ej: Serie Completa - Episodio 1" required>
                    </div>

                    <div class="input-group">
                        <label for="url">🔗 Pegar Enlace / URL</label>
                        <input type="url" id="url" name="url" placeholder="https://..." required>
                    </div>

                    <button type="submit" class="btn-procesar">
                        🚀 DESCARGAR Y PROCESAR
                    </button>
                </form>
            </div>

            <div id="resultado" class="resultado"></div>
        </main>
    </div>

    <!-- 🍯 PUBLICIDAD -->
    <div class="publicidad">
        <div class="avatar-placeholder">
            <span>🤖</span>
        </div>
        <div class="texto-publi">
            <p class="titulo-publi">Powered by Dola AI</p>
            <p class="subtitulo-publi">Asistencia Técnica y Desarrollo</p>
        </div>
    </div>

    <!-- 🎮 CONTROLADOR EXTERNO -->
    <script src="/index.js"></script>
</body>
</html>
