<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MallyCuts - Sistema Profesional</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ MALLYCUTS</h1>
            <p>Sistema automatizado de edición</p>
        </header>

        <div class="opciones-panel">
            <button id="btnArchivo" class="boton-opcion activo">📁 SUBIR VIDEO</button>
            <button id="btnEnlace" class="boton-opcion">🔗 DESCARGAR</button>
        </div>

        <main>
            <!-- SECCIÓN SUBIR ARCHIVO -->
            <div id="seccionArchivo" class="seccion">
                <form id="formularioArchivo">
                    <div class="input-group">
                        <label for="titulo">📝 Título del Video</label>
                        <input type="text" id="titulo" name="titulo" placeholder="Ej: Serie Completa" required>
                    </div>

                    <div class="input-group">
                        <label for="video">🎬 Seleccionar Archivo</label>
                        <div class="file-input">
                            <input type="file" id="video" name="archivo_video" accept="video/*" required>
                            <span id="file-label">Ningún archivo seleccionado</span>
                        </div>
                    </div>

                    <button type="submit" class="btn-procesar">🚀 INICIAR PROCESO</button>
                </form>
            </div>

            <!-- SECCIÓN DESCARGA (REDIRIJE) -->
            <div id="seccionEnlace" class="seccion" style="display: none;">
                <div class="redirect-card">
                    <h2>🔗 Módulo de Descargas</h2>
                    <p>Ve a la página especial para gestionar enlaces:</p>
                    <a href="/descarga.html" class="btn-ir">📥 IR A DESCARGAS</a>
                </div>
            </div>

            <div id="resultado" class="resultado"></div>
        </main>
    </div>

    <script src="/index.js"></script>
</body>
</html>
