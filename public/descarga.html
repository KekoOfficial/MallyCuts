<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargas - MallyCuts</title>
    <link rel="stylesheet" href="descarga.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">📥</div>
            <h1>MODULO DESCARGAS</h1>
            <p>Extrae videos desde cualquier enlace</p>
        </header>

        <main>
            <form id="formularioDescarga">
                
                <div class="form-group">
                    <label for="urlInput">🔗 Enlace / URL</label>
                    <input type="url" id="urlInput" placeholder="https://..." required>
                </div>

                <div class="form-group">
                    <label for="nombreInput">📝 Nombre del Video</label>
                    <input type="text" id="nombreInput" placeholder="Ej: Serie Nueva" required>
                </div>

                <div class="opciones">
                    <h3>⚙️ Opciones de Procesamiento</h3>
                    <label class="check-label">
                        <input type="checkbox" id="cortarCheck" checked>
                        <span>Cortar en partes de 2 minutos</span>
                    </label>
                    <label class="check-label">
                        <input type="checkbox" id="velocidadCheck" checked>
                        <span>Aplicar velocidad 1.2x</span>
                    </label>
                </div>

                <button type="submit" class="btn-submit">
                    🚀 INICIAR DESCARGA
                </button>
            </form>

            <div id="estado" class="estado">
                Esperando enlace...
            </div>
        </main>

        <div class="volver">
            <a href="/">⬅️ Volver al menú principal</a>
        </div>
    </div>

    <script src="descarga.js"></script>
</body>
</html>
