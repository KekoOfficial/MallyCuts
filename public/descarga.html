<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargas - MallyCuts</title>
    <link rel="stylesheet" href="descarga.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📥 MÓDULO DESCARGAS</h1>
            <p>Extrae videos desde cualquier enlace</p>
        </header>

        <main>
            <form id="formularioDescarga">
                <div class="input-box">
                    <label>🔗 Pegar Enlace / URL</label>
                    <input type="url" id="urlInput" placeholder="https://..." required>
                </div>

                <div class="input-box">
                    <label>📝 Nombre del Archivo</label>
                    <input type="text" id="nombreInput" placeholder="Video_Parte_1" required>
                </div>

                <div class="opciones">
                    <h3>⚙️ Opciones</h3>
                    <label>
                        <input type="checkbox" id="cortarCheck" checked>
                        Cortar en partes de 2 minutos
                    </label>
                    <label>
                        <input type="checkbox" id="velocidadCheck" checked>
                        Aplicar velocidad 1.2x
                    </label>
                </div>

                <button type="submit" class="btn-descargar">🚀 INICIAR DESCARGA</button>
            </form>

            <div id="estado" class="estado">
                Esperando enlace...
            </div>
        </main>

        <div class="volver">
            <a href="/">⬅️ Volver al menú principal</a>
        </div>
    </div>

    <script src="descarga.js"></script>
</body>
</html>
