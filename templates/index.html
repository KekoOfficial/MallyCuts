<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKURA FOTOS</title>
    <style>
        :root { --bg: #000; --sakura: #ffb7c5; --accent: #111; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        
        h1 { font-size: 1.2rem; font-weight: 300; margin-bottom: 20px; color: var(--sakura); }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 columnas como en tu foto */
            gap: 5px;
        }

        .video-item {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .video-item img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.3s;
        }

        .video-item.selected { border-color: var(--sakura); }
        .video-item.selected img { transform: scale(0.9); }

        .video-name {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(0,0,0,0.6); font-size: 0.6rem;
            padding: 4px 0; text-align: center;
        }

        .btn-float {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: var(--sakura); color: #000;
            border: none; padding: 15px 40px;
            border-radius: 30px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(255,183,197,0.4);
            display: none;
        }
    </style>
</head>
<body>

    <h1>Fotos / Videos</h1>

    <div class="gallery">
        {% for v in videos %}
        <div class="video-item" onclick="selectVideo(this, '{{ v.name }}')">
            <img src="/static/thumbs/{{ v.thumb }}" alt="thumb">
            <div class="video-name">{{ v.name[:10] }}...</div>
        </div>
        {% endfor %}
    </div>

    <button id="runBtn" class="btn-float" onclick="lanzar()">INICIAR CORTE</button>

    <script>
        let selectedFile = "";

        function selectVideo(el, name) {
            document.querySelectorAll('.video-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            selectedFile = name;
            document.getElementById('runBtn').style.display = 'block';
        }

        function lanzar() {
            const btn = document.getElementById('runBtn');
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            fetch('/run', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ video_file: selectedFile })
            })
            .then(res => res.json())
            .then(data => alert(data.message))
            .finally(() => location.reload());
        }
    </script>
</body>
</html>
