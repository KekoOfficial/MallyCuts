<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MallyCuts Express</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
    <!-- Encabezado -->
    <header class="encabezado">
        <h1 class="titulo-principal">
            <i class="fa fa-cut"></i>
            MALLYCUTS EXPRESS
        </h1>
    </header>

    <!-- Contenido Principal -->
    <main class="contenedor-principal">
        <!-- Tarjeta Principal -->
        <div class="tarjeta-principal">
            <p class="descripcion">Corta y envía tus vídeos automáticamente a Telegram</p>

            <!-- Formulario -->
            <form id="formulario" class="formulario">
                <!-- Campo Título -->
                <div class="campo-grupo">
                    <label for="titulo" class="etiqueta">
                        <i class="fa fa-pencil"></i> Título del vídeo
                    </label>
                    <input 
                        type="text" 
                        id="titulo" 
                        name="titulo" 
                        placeholder="Ej: Mi serie favorita - Capítulo 1" 
                        required
                        class="entrada-texto"
                    >
                </div>

                <!-- Campo Archivo -->
                <div class="campo-grupo">
                    <label for="video" class="etiqueta">
                        <i class="fa fa-file-video-o"></i> Seleccionar vídeo
                    </label>
                    <input 
                        type="file" 
                        id="video" 
                        name="video" 
                        accept="video/*" 
                        required
                        class="entrada-archivo"
                    >
                    <p class="texto-ayuda">Formatos admitidos: MP4, AVI, MOV, MKV y más</p>
                </div>

                <!-- Botón de Envío -->
                <button 
                    type="submit" 
                    id="botonEnviar"
                    class="boton-enviar"
                >
                    <i class="fa fa-rocket"></i>
                    <span>INICIAR PROCESAMIENTO</span>
                </button>
            </form>

            <!-- Área de Estado -->
            <div id="estado" class="area-estado oculto"></div>
        </div>

        <!-- Información Adicional -->
        <div class="info-adicional">
            <p><i class="fa fa-info-circle"></i> El sistema cortará el vídeo en segmentos de 60 segundos y los enviará automáticamente</p>
            <p class="mt-1">Desarrollado para <span class="texto-acento">@MallyUmbrae</span></p>
        </div>
    </main>

    <script>
        const formulario = document.getElementById('formulario');
        const estadoDiv = document.getElementById('estado');
        const botonEnviar = document.getElementById('botonEnviar');

        formulario.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Mostrar estado de carga
            estadoDiv.classList.remove('oculto', 'estado-exito', 'estado-aviso', 'estado-error');
            estadoDiv.classList.add('estado-cargando');
            estadoDiv.innerHTML = `
                <div class="contenido-estado">
                    <i class="fa fa-spinner fa-spin icono-estado"></i>
                    <span class="texto-estado">📤 Subiendo archivo... Por favor espera</span>
                </div>
            `;

            // Desactivar botón
            botonEnviar.disabled = true;
            botonEnviar.innerHTML = `<i class="fa fa-clock-o"></i> <span>PROCESANDO...</span>`;
            botonEnviar.classList.add('boton-deshabilitado');

            try {
                // Enviar datos al servidor
                const datosFormulario = new FormData(formulario);
                const respuesta = await fetch('/procesar', {
                    method: 'POST',
                    body: datosFormulario
                });

                const resultado = await respuesta.json();

                // Mostrar resultado
                if (resultado.status === "ok") {
                    estadoDiv.classList.remove('estado-cargando');
                    estadoDiv.classList.add('estado-exito');
                    estadoDiv.innerHTML = `
                        <div class="contenido-estado">
                            <i class="fa fa-check-circle icono-estado"></i>
                            <div>
                                <span class="titulo-estado">¡Proceso iniciado correctamente!</span>
                                <p class="detalle-estado">${resultado.mensaje}</p>
                                <p class="detalle-estado">El sistema está trabajando en segundo plano, recibirás los archivos en tu canal de Telegram en breve.</p>
                            </div>
                        </div>
                    `;
                } 
                else if (resultado.status === "ocupado") {
                    estadoDiv.classList.remove('estado-cargando');
                    estadoDiv.classList.add('estado-aviso');
                    estadoDiv.innerHTML = `
                        <div class="contenido-estado">
                            <i class="fa fa-exclamation-triangle icono-estado"></i>
                            <span class="texto-estado">${resultado.mensaje}</span>
                        </div>
                    `;
                } 
                else {
                    estadoDiv.classList.remove('estado-cargando');
                    estadoDiv.classList.add('estado-error');
                    estadoDiv.innerHTML = `
                        <div class="contenido-estado">
                            <i class="fa fa-times-circle icono-estado"></i>
                            <span class="texto-estado">${resultado.mensaje || "Ocurrió un error inesperado"}</span>
                        </div>
                    `;
                }

            } catch (error) {
                estadoDiv.classList.remove('estado-cargando');
                estadoDiv.classList.add('estado-error');
                estadoDiv.innerHTML = `
                    <div class="contenido-estado">
                        <i class="fa fa-times-circle icono-estado"></i>
                        <span class="texto-estado">❌ No se pudo conectar al servidor. Revisa tu conexión o el estado del sistema.</span>
                    </div>
                `;
                console.error("Error de conexión:", error);
            } 
            finally {
                // Restaurar botón y limpiar formulario
                botonEnviar.disabled = false;
                botonEnviar.innerHTML = `<i class="fa fa-rocket"></i> <span>INICIAR PROCESAMIENTO</span>`;
                botonEnviar.classList.remove('boton-deshabilitado');
                formulario.reset();
            }
        });
    </script>
</body>
</html>
