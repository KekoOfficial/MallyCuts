<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MallyCuts - Sistema Profesional</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ MALLYCUTS</h1>
            <p>Sistema automatizado de edición y envío</p>
        </header>

        <!-- 🎛️ PANEL DE OPCIONES -->
        <div class="opciones-panel">
            <button id="btnArchivo" class="boton-opcion activo">
                📁 SUBIR VIDEO
            </button>
            <button id="btnEnlace" class="boton-opcion">
                🔗 ENLACE / LINK
            </button>
        </div>

        <main>
            <!-- 📂 SECCIÓN: SUBIR ARCHIVO -->
            <div id="seccionArchivo" class="seccion-formulario">
                <form id="formularioArchivo" enctype="multipart/form-data">
                    
                    <div class="input-group">
                        <label for="titulo">📝 Título del Video</label>
                        <input type="text" id="titulo" name="titulo" placeholder="Ej: Serie Completa - Episodio 1" required>
                    </div>

                    <div class="input-group">
                        <label for="video">🎬 Seleccionar Archivo</label>
                        <div class="file-input">
                            <input type="file" id="video" name="archivo_video" accept="video/*" required>
                            <span id="file-label">Ningún archivo seleccionado</span>
                        </div>
                    </div>

                    <button type="submit" class="btn-procesar">
                        🚀 INICIAR PROCESO
                    </button>
                </form>
            </div>

            <!-- 🔗 SECCIÓN: PEGAR ENLACE -->
            <div id="seccionEnlace" class="seccion-formulario" style="display: none;">
                <form id="formularioEnlace">
                    
                    <div class="input-group">
                        <label for="tituloEnlace">📝 Título del Video</label>
                        <input type="text" id="tituloEnlace" name="titulo" placeholder="Ej: Serie Completa - Episodio 1" required>
                    </div>

                    <div class="input-group">
                        <label for="url">🔗 Pegar Enlace / URL</label>
                        <input type="url" id="url" name="url" placeholder="https://..." required>
                    </div>

                    <button type="submit" class="btn-procesar">
                        🚀 DESCARGAR Y PROCESAR
                    </button>
                </form>
            </div>

            <div id="resultado" class="resultado"></div>
        </main>
    </div>

    <script>
        // Lógica de los botones
        const btnArchivo = document.getElementById('btnArchivo');
        const btnEnlace = document.getElementById('btnEnlace');
        const seccionArchivo = document.getElementById('seccionArchivo');
        const seccionEnlace = document.getElementById('seccionEnlace');

        btnArchivo.addEventListener('click', () => {
            seccionArchivo.style.display = 'block';
            seccionEnlace.style.display = 'none';
            btnArchivo.classList.add('activo');
            btnEnlace.classList.remove('activo');
        });

        btnEnlace.addEventListener('click', () => {
            seccionArchivo.style.display = 'none';
            seccionEnlace.style.display = 'block';
            btnArchivo.classList.remove('activo');
            btnEnlace.classList.add('activo');
        });

        // Mostrar nombre de archivo
        document.getElementById('video').addEventListener('change', function(e) {
            document.getElementById('file-label').textContent = e.target.files[0]?.name || 'Ningún archivo seleccionado';
        });

        // Envío Formulario Archivo
        document.getElementById('formularioArchivo').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = '⏳ PROCESANDO...';
            
            const formData = new FormData(e.target);
            const res = await fetch('/procesar', { method: 'POST', body: formData });
            const data = await res.json();
            
            alert(data.mensaje);
            btn.disabled = false;
            btn.textContent = '🚀 INICIAR PROCESO';
        });

        // Envío Formulario Enlace
        document.getElementById('formularioEnlace').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = '⏳ DESCARGANDO...';
            
            const datos = {
                titulo: document.getElementById('tituloEnlace').value,
                url: document.getElementById('url').value
            };

            const res = await fetch('/procesar-enlace', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });
            const data = await res.json();
            
            alert(data.mensaje);
            btn.disabled = false;
            btn.textContent = '🚀 DESCARGAR Y PROCESAR';
        });
    </script>
</body>
</html>
