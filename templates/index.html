<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALLY SERIES STUDIO</title>
    <style>
        :root { --sakura: #ff00ff; --bg: #000; --green: #00ff00; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Courier New', monospace; 
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .panel {
            width: 90%; max-width: 400px; padding: 30px;
            border: 2px solid var(--sakura); border-radius: 20px;
            box-shadow: 0 0 20px var(--sakura); text-align: center;
        }
        h1 { font-size: 1.2rem; color: var(--sakura); margin-bottom: 25px; letter-spacing: 2px; }
        
        input[type="text"] {
            width: 100%; padding: 12px; background: transparent; 
            border: 1px solid var(--green); color: var(--green);
            border-radius: 8px; margin-bottom: 15px; box-sizing: border-box;
            outline: none; text-align: center;
        }

        /* Botón que simula el input de archivo */
        .file-label {
            display: block; width: 100%; padding: 12px;
            border: 1px dashed var(--green); color: var(--green);
            border-radius: 8px; cursor: pointer; margin-bottom: 20px;
            box-sizing: border-box; font-size: 0.8rem;
        }

        #videoInput { display: none; } /* Escondemos el input feo de HTML */

        .btn-main {
            width: 100%; padding: 15px; background: var(--sakura); color: #000;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h1>MALLY SERIES STUDIO</h1>

        <input type="text" id="serieName" placeholder="NOMBRE DE LA SERIE">

        <label for="videoInput" class="file-label" id="fileNameLabel">
            📂 SELECCIONAR VIDEO DE GALERÍA
        </label>
        <input type="file" id="videoInput" accept="video/*">

        <button class="btn-main" onclick="subirYProcesar()">INICIAR PRODUCCIÓN</button>
    </div>

    <script>
        const videoInput = document.getElementById('videoInput');
        const label = document.getElementById('fileNameLabel');

        // Actualiza el texto cuando eliges un video de tu galería
        videoInput.onchange = () => {
            if(videoInput.files[0]) label.innerText = "✅ " + videoInput.files[0].name;
        };

        function subirYProcesar() {
            const nombre = document.getElementById('serieName').value;
            const video = videoInput.files[0];

            if(!nombre || !video) return alert("Falta nombre o video");

            const formData = new FormData();
            formData.append('video', video);
            formData.append('serie_name', nombre);

            // Cambiamos a 'fetch' con FormData para enviar el archivo real
            fetch('/run', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => alert(data.message))
            .finally(() => location.reload());
        }
    </script>
</body>
</html>
