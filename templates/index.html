<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MallyCuts</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="contenedor-principal">
        <!-- TÍTULO PRINCIPAL QUE TÚ PONES -->
        <h1>MALLYCUTS</h1>

        <div class="caja-formulario">
            <!-- CAMPO PARA EL TÍTULO DEL CONTENIDO -->
            <div class="campo">
                <label for="titulo">📝 Título del contenido</label>
                <input 
                    type="text" 
                    id="titulo" 
                    placeholder="Escribí aquí el título..." 
                    autocomplete="off"
                >
            </div>

            <!-- CAMPO PARA SUBIR EL VÍDEO -->
            <div class="campo">
                <label for="video">📹 Subir vídeo</label>
                <div class="area-subida" id="areaSubida">
                    <input type="file" id="video" accept="video/*">
                    <p id="textoAyuda">Hacé clic o arrastrá el archivo aquí</p>
                    <span id="nombreArchivo" class="nombre-archivo"></span>
                </div>
            </div>

            <!-- ZONA DE MENSAJES -->
            <div class="zona-mensajes">
                <div id="mensajeAlerta" class="mensaje alerta">
                    ⚠️ Te falta poner el título primero
                </div>
                <div id="mensajeProcesando" class="mensaje procesando">
                    ⏳ PROCESANDO... Espere un momento por favor
                </div>
                <div id="mensajeExito" class="mensaje exito">
                    ✅ ¡Todo listo! El contenido se está enviando a los canales
                </div>
                <div id="mensajeError" class="mensaje error">
                    ❌ Ocurrió un error, revisá los datos e intentá de nuevo
                </div>
            </div>
        </div>
    </div>

    <script>
        // Elementos del HTML
        const inputTitulo = document.getElementById('titulo');
        const inputVideo = document.getElementById('video');
        const textoAyuda = document.getElementById('textoAyuda');
        const nombreArchivo = document.getElementById('nombreArchivo');
        const areaSubida = document.getElementById('areaSubida');

        // Mensajes
        const mensajeAlerta = document.getElementById('mensajeAlerta');
        const mensajeProcesando = document.getElementById('mensajeProcesando');
        const mensajeExito = document.getElementById('mensajeExito');
        const mensajeError = document.getElementById('mensajeError');

        // Ocultar todos los mensajes al principio
        function ocultarTodosLosMensajes() {
            mensajeAlerta.style.display = 'none';
            mensajeProcesando.style.display = 'none';
            mensajeExito.style.display = 'none';
            mensajeError.style.display = 'none';
        }

        // Mostrar solo el mensaje que corresponda
        function mostrarMensaje(mensaje) {
            ocultarTodosLosMensajes();
            mensaje.style.display = 'block';
        }

        // Verificar si ya se puede procesar
        function verificarCondiciones() {
            const tituloEscrito = inputTitulo.value.trim();
            const archivoSeleccionado = inputVideo.files.length > 0;

            // Si hay video pero NO hay título
            if (archivoSeleccionado && !tituloEscrito) {
                mostrarMensaje(mensajeAlerta);
                return false;
            }

            // Si ya hay título Y ya hay video: ¡PROCESAR AUTOMÁTICAMENTE!
            if (tituloEscrito && archivoSeleccionado) {
                mostrarMensaje(mensajeProcesando);
                
                // Enviar los datos al sistema automáticamente
                const formData = new FormData();
                formData.append('titulo', tituloEscrito);
                formData.append('video', inputVideo.files[0]);

                fetch('/procesar', {
                    method: 'POST',
                    body: formData
                })
                .then(respuesta => respuesta.json())
                .then(datos => {
                    if (datos.status === 'ok') {
                        mostrarMensaje(mensajeExito);
                        // Limpiar campos después de terminar
                        setTimeout(() => {
                            inputTitulo.value = '';
                            inputVideo.value = '';
                            nombreArchivo.textContent = '';
                            textoAyuda.style.display = 'block';
                            ocultarTodosLosMensajes();
                        }, 4000);
                    } else {
                        mostrarMensaje(mensajeError);
                    }
                })
                .catch(() => {
                    mostrarMensaje(mensajeError);
                });

                return true;
            }

            // Si falta alguno de los dos, no hacer nada
            ocultarTodosLosMensajes();
            return false;
        }

        // Evento cuando cambia el título
        inputTitulo.addEventListener('input', verificarCondiciones);

        // Evento cuando se sube el vídeo
        inputVideo.addEventListener('change', () => {
            if (inputVideo.files.length > 0) {
                textoAyuda.style.display = 'none';
                nombreArchivo.textContent = `📁 Archivo: ${inputVideo.files[0].name}`;
            } else {
                textoAyuda.style.display = 'block';
                nombreArchivo.textContent = '';
            }
            verificarCondiciones();
        });

        // Efecto visual al arrastrar archivos
        areaSubida.addEventListener('dragover', (e) => {
            e.preventDefault();
            areaSubida.classList.add('activo');
        });

        areaSubida.addEventListener('dragleave', () => {
            areaSubida.classList.remove('activo');
        });

        areaSubida.addEventListener('drop', (e) => {
            e.preventDefault();
            areaSubida.classList.remove('activo');
            if (e.dataTransfer.files.length > 0) {
                inputVideo.files = e.dataTransfer.files;
                textoAyuda.style.display = 'none';
                nombreArchivo.textContent = `📁 Archivo: ${e.dataTransfer.files[0].name}`;
                verificarCondiciones();
            }
        });
    </script>
</body>
</html>
