<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALLY CUTS PRO</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; }
        .card { border: 2px solid #ff00ff; margin: 50px auto; width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 0 20px #ff00ff; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; box-sizing: border-box; }
        input { background: #111; border: 1px solid #00ff00; color: #00ff00; }
        button { background: #ff00ff; color: #000; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Mally Cuts PRO 😈</h1>
        <form id="uploadForm">
            <input type="text" id="nombre" placeholder="Nombre de la Serie" required>
            <input type="file" id="video" accept="video/*" required>
            <button type="submit">DESPLEGAR SISTEMA</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true; btn.innerText = "SUBIENDO...";
            
            const fd = new FormData();
            fd.append('video', document.getElementById('video').files[0]);
            fd.append('nombre', document.getElementById('nombre').value);

            const res = await fetch('/', { method: 'POST', body: fd });
            const data = await res.json();
            document.getElementById('status').innerText = data.msg;
            btn.innerText = "EN COLA ✅";
        };
    </script>
</body>
</html>
