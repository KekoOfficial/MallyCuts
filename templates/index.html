<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>⚔️ MallyCuts - Nivel Dios</title>
    <style>
        body {
            background: #0f0f1a;
            color: #fff;
            font-family: 'Arial', sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 { text-align: center; color: #ffd700; }
        .card {
            background: #1a1a2e;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 6px;
            box-sizing: border-box;
        }
        input { background: #0f0f1a; border: 1px solid #333; color: white; }
        button {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        #estado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            text-align: center;
        }
        .procesando { background: #2c2c00; color: #ffd700; }
        .listo { background: #004d00; color: #90ee90; }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚔️ MallyCuts ⚔️</h1>
        <p style="text-align:center;">Modo Estable | Calidad 1080p | Envío Ordenado</p>

        <form id="formulario">
            <label>📝 Título de la Serie/Película:</label>
            <input type="text" id="titulo" required placeholder="Ej: El Señor de los Anillos">
            
            <label>🎬 Archivo de Video:</label>
            <input type="file" id="video" accept="video/*" required>
            
            <label>🖼️ Imagen de Portada:</label>
            <input type="file" id="portada" accept="image/*" required>
            
            <button type="submit">🔥 INICIAR PROCESO DE DIOS 🔥</button>
        </form>

        <div id="estado"></div>
    </div>

    <script>
        document.getElementById('formulario').onsubmit = async (e) => {
            e.preventDefault();
            
            const estado = document.getElementById('estado');
            estado.style.display = 'block';
            estado.className = 'procesando';
            estado.innerHTML = '⏳ CARGANDO ARCHIVOS...<br>Esto puede tardar, modo calidad activado.';

            const formData = new FormData();
            formData.append('titulo', document.getElementById('titulo').value);
            formData.append('video', document.getElementById('video').files[0]);
            formData.append('portada', document.getElementById('portada').files[0]);

            const res = await fetch('/procesar', { method: 'POST', body: formData });
            const data = await res.json();

            if(data.status == 'ok'){
                estado.className = 'listo';
                estado.innerHTML = data.mensaje + '<br>✅ Puedes cerrar esta ventana, el proceso sigue corriendo.';
            } else {
                estado.innerHTML = '❌ ERROR: ' + data.mensaje;
            }
        }
    </script>
</body>
</html>
