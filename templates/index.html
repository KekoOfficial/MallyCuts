<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKURA GALLERY V10</title>
    <style>
        :root { --bg: #0a0a0a; --sakura: #ffb7c5; --text: #e0e0e0; --accent: #1a1a1a; }
        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            justify-content: center; align-items: center; 
            height: 100vh; margin: 0; text-transform: uppercase; letter-spacing: 1px;
        }
        .container { 
            border: 1px solid var(--sakura); padding: 30px; 
            background: var(--accent); box-shadow: 0 0 20px rgba(255, 183, 197, 0.1); 
            text-align: center; border-radius: 8px; width: 320px;
        }
        h1 { color: var(--sakura); font-size: 1.2rem; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        select {
            width: 100%; padding: 10px; background: #000; color: var(--sakura);
            border: 1px solid #444; margin-bottom: 20px; outline: none;
        }

        button {
            width: 100%; background: none; border: 1px solid var(--sakura); 
            color: var(--sakura); padding: 12px; cursor: pointer; 
            font-weight: bold; transition: 0.3s;
        }
        button:hover { background: var(--sakura); color: var(--bg); }
        button:disabled { border-color: #444; color: #444; }
        
        .footer { margin-top: 20px; font-size: 0.6rem; opacity: 0.4; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌸 Sakura Gallery</h1>
        
        <label style="font-size: 0.7rem; display: block; margin-bottom: 10px;">Selecciona Video:</label>
        <select id="videoSelect">
            {% for video in videos %}
            <option value="{{ video }}">{{ video }}</option>
            {% endfor %}
        </select>

        <button id="runBtn" onclick="desplegar()">Cortar y Enviar</button>
        
        <div class="footer">@OliDevX | Mally Studio</div>
    </div>

    <script>
        function desplegar() {
            const btn = document.getElementById('runBtn');
            const video = document.getElementById('videoSelect').value;
            
            if(!video) return alert("No hay video seleccionado");

            btn.disabled = true;
            btn.innerText = "PROCESANDO FRAGMENTOS...";

            fetch('/run', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ video_file: video })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                location.reload(); // Recarga para actualizar la lista si se borró el video
            })
            .catch(err => alert("Error de conexión"));
        }
    </script>
</body>
</html>
