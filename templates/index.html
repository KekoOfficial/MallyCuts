<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKURA PANEL</title>
    <style>
        :root { --sakura: #ffb7c5; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 15px; }
        .item { aspect-ratio: 1/1; background: #111; cursor: pointer; position: relative; overflow: hidden; }
        .item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .item.selected { outline: 3px solid var(--sakura); outline-offset: -3px; }
        .item.selected img { opacity: 1; }
        input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: var(--sakura); border-radius: 5px; box-sizing: border-box; }
        .btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--sakura); color: #000; border: none; padding: 15px 40px;
            border-radius: 30px; font-weight: bold; display: none; z-index: 100;
        }
    </style>
</head>
<body>
    <input type="text" id="serieTitle" placeholder="Nombre de la Serie...">
    <div class="gallery">
        {% for v in videos %}
        <div class="item" onclick="select(this, '{{ v.name }}')">
            <img src="/static/thumbs/{{ v.thumb }}">
        </div>
        {% endfor %}
    </div>
    <button id="actionBtn" class="btn" onclick="start()">INICIAR CORTES</button>

    <script>
        let selectedFile = "";
        function select(el, name) {
            document.querySelectorAll('.item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            selectedFile = name;
            document.getElementById('actionBtn').style.display = 'block';
        }
        function start() {
            const title = document.getElementById('serieTitle').value;
            if(!title) return alert("Escribe el nombre de la serie");
            const btn = document.getElementById('actionBtn');
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            fetch('/run', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ video_file: selectedFile, serie_name: title })
            }).then(res => res.json()).then(data => {
                alert(data.message);
                location.reload();
            });
        }
    </script>
</body>
</html>
