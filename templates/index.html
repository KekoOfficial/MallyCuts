<!DOCTYPE html>
<html>
<head>
    <title>MallyCuts Express</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; text-align: center; padding-top: 50px; }
        input, button { display: block; margin: 15px auto; padding: 10px; width: 80%; max-width: 400px; }
        button { background: #fff; color: #000; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h1>⚔️ MALLYCUTS EXPRESS ⚔️</h1>

    <form id="formulario">
        <input type="text" name="titulo" placeholder="Título del video" required>
        <input type="file" name="video" accept="video/*" required>
        <button type="submit">🚀 LANZAR PROCESO</button>
    </form>

    <div id="estado"></div>

<script>
document.getElementById('formulario').onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    document.getElementById('estado').innerHTML = "⏳ Subiendo y procesando...";
    
    const res = await fetch('/procesar', { method: 'POST', body: formData });
    const data = await res.json();
    document.getElementById('estado').innerHTML = `<strong>${data.mensaje}</strong>`;
}
</script>

</body>
</html>
