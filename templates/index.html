<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALLY CUTS STUDIO</title>
    <style>
        :root { --sakura:#ff00ff; --bg:#000; --green:#00ff00; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Courier New', monospace; 
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .panel {
            width: 90%; max-width: 420px; padding: 25px;
            border: 2px solid var(--sakura); border-radius: 20px;
            box-shadow: 0 0 20px var(--sakura); text-align: center;
            background: #0a0a0a;
        }
        h1 { font-size: 1.2rem; color: var(--sakura); margin-bottom: 20px; letter-spacing: 2px; }
        input[type="text"] {
            width: 100%; padding: 12px; background: transparent; 
            border: 1px solid var(--green); color: var(--green);
            border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; text-align: center;
        }
        .file-box {
            display: block; width: 100%; padding: 12px;
            border: 1px dashed var(--green); color: var(--green);
            border-radius: 8px; cursor: pointer; margin-bottom: 10px;
            box-sizing: border-box; font-size: 0.8rem;
        }
        input[type="file"] { display: none; }
        .btn-main {
            width: 100%; padding: 15px; background: var(--sakura); color: #000;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; margin-top: 10px;
        }
        .btn-main:disabled { background: #444; color: #888; cursor: not-allowed; }
        .progress-box { margin-top: 20px; display: none; }
        .progress-bar { width: 100%; height: 10px; background: #222; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--green); transition: width 0.4s; }
        .status-text { margin-top: 10px; font-size: 0.8rem; color: var(--green); }
    </style>
</head>
<body>

<div class="panel">
    <h1>MALLY CUTS PRO</h1>

    <input type="text" id="serieName" placeholder="NOMBRE DE LA SERIE">

    <label for="portadaInput" class="file-box" id="portadaLabel">🖼️ SELECCIONAR PORTADA</label>
    <input type="file" id="portadaInput" accept="image/*">

    <label for="videoInput" class="file-box" id="videoLabel">📹 SELECCIONAR VIDEO</label>
    <input type="file" id="videoInput" accept="video/*">

    <button class="btn-main" id="btnGo" onclick="subirTodo()">INICIAR PRODUCCIÓN</button>

    <div class="progress-box" id="progressBox">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="status-text" id="statusText">Esperando respuesta del servidor...</div>
    </div>
</div>

<script>
    const vInput = document.getElementById('videoInput');
    const pInput = document.getElementById('portadaInput');
    const vLabel = document.getElementById('videoLabel');
    const pLabel = document.getElementById('portadaLabel');
    const progressBox = document.getElementById('progressBox');
    const progressFill = document.getElementById('progressFill');
    const statusText = document.getElementById('statusText');
    const btn = document.getElementById('btnGo');

    vInput.onchange = () => { if(vInput.files[0]) vLabel.innerText = "✅ " + vInput.files[0].name; };
    pInput.onchange = () => { if(pInput.files[0]) pLabel.innerText = "✅ " + pInput.files[0].name; };

    async function subirTodo() {
        const nombre = document.getElementById('serieName').value;
        const video = vInput.files[0];
        const portada = pInput.files[0];

        if(!nombre || !video || !portada) return alert("Error: Debes completar todos los campos.");

        // Bloqueo de UI
        btn.disabled = true;
        btn.innerText = "SUBIENDO ARCHIVOS...";
        progressBox.style.display = "block";
        progressFill.style.width = "30%";

        const fd = new FormData();
        fd.append('video', video);
        fd.append('portada', portada);
        fd.append('nombre', nombre);

        try {
            const res = await fetch('/run', { method: 'POST', body: fd });
            const data = await res.json();

            if (res.ok) {
                progressFill.style.width = "100%";
                statusText.innerText = "🚀 " + data.message;
                btn.innerText = "¡EN PROCESO!";
            } else {
                throw new Error(data.error || "Error desconocido");
            }
        } catch (err) {
            statusText.style.color = "red";
            statusText.innerText = "❌ ERROR: " + err.message;
            btn.disabled = false;
            btn.innerText = "REINTENTAR";
        }
    }
</script>
</body>
</html>
