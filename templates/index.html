<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALLY SERIES • UMBRAE STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-color: #00f2ff;
            --neon-glow: rgba(0, 242, 255, 0.5);
            --bg-dark: #050505;
            --card-bg: rgba(20, 20, 20, 0.95);
            --input-bg: #121212;
            --text-gray: #888;
            --accent-gradient: linear-gradient(90deg, #00f2ff, #0072ff);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(0, 114, 255, 0.05) 0%, transparent 20%);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        /* Línea superior decorativa */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 20%; right: 20%;
            height: 2px;
            background: var(--accent-gradient);
            box-shadow: 0 0 10px var(--neon-color);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 5px;
            margin: 0;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .header p {
            color: var(--text-gray);
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-top: 8px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            color: var(--neon-color);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        input[type="text"], textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 14px;
            color: #eee;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--neon-color);
            background: #181818;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .file-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .file-upload {
            position: relative;
            background: #151515;
            border: 1px dashed #333;
            border-radius: 12px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .file-upload:hover {
            border-color: var(--neon-color);
            background: rgba(0, 242, 255, 0.02);
        }

        .file-upload input[type="file"] {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-info {
            font-size: 0.75rem;
            color: var(--text-gray);
            display: block;
            margin-top: 5px;
        }

        .file-icon {
            font-size: 1.2rem;
            margin-bottom: 8px;
            display: block;
        }

        button {
            width: 100%;
            background: var(--accent-gradient);
            border: none;
            color: white;
            padding: 18px;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0, 114, 255, 0.2);
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px var(--neon-glow);
        }

        .footer-logo {
            text-align: center;
            margin-top: 30px;
            color: var(--text-gray);
            font-size: 0.7rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
        }

        /* Status & Animations */
        #status {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .loader-container {
            position: relative;
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
        }

        .loader {
            border: 2px solid transparent;
            border-top: 2px solid var(--neon-color);
            border-radius: 50%;
            width: 100%; height: 100%;
            animation: spin 1s linear infinite;
        }

        .loader-pulse {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--neon-glow);
            border-radius: 50%;
            animation: pulse 1.5s ease-out infinite;
            z-index: -1;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: var(--neon-color);
            letter-spacing: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>MALLY SERIES</h1>
        <p>UMBRAE STUDIO • CORE V2</p>
    </div>

    <form action="/upload" method="post" enctype="multipart/form-data" id="uploadForm">
        <div class="form-group">
            <label><span>◈</span> Título del Proyecto</label>
            <input type="text" name="nombre" placeholder="EJ: EL IMPERIO CONTRAATACA" required>
        </div>

        <div class="form-group">
            <label><span>◈</span> Sinopsis Ejecutiva</label>
            <textarea name="descripcion" rows="3" placeholder="Escribe los detalles de la obra..." required></textarea>
        </div>

        <label><span>◈</span> Assets del Sistema</label>
        <div class="file-grid">
            <div class="file-upload" id="drop-portada">
                <span class="file-icon">🖼️</span>
                <span class="file-info" id="portadaName">PORTADA JPG</span>
                <input type="file" name="portada" accept="image/*" required onchange="updateFileName(this, 'portadaName')">
            </div>

            <div class="file-upload" id="drop-video">
                <span class="file-icon">🎥</span>
                <span class="file-info" id="videoName">MASTER MP4</span>
                <input type="file" name="video" accept="video/*" required onchange="updateFileName(this, 'videoName')">
            </div>
        </div>

        <button type="submit" id="btnSubmit">DESPLEGAR PRODUCCIÓN</button>
    </form>

    <div id="status">
        <div class="loader-container">
            <div class="loader"></div>
            <div class="loader-pulse"></div>
        </div>
        <p class="loading-text">SINCRONIZANDO CON EL SERVIDOR...</p>
    </div>

    <div class="footer-logo">UMBRAE STUDIO</div>
</div>

<script>
    function updateFileName(input, elementId) {
        if (input.files && input.files[0]) {
            const fileName = input.files[0].name;
            const shortName = fileName.length > 15 ? fileName.substring(0, 12) + "..." : fileName;
            document.getElementById(elementId).innerText = "✅ " + shortName;
            document.getElementById(elementId).style.color = "#00f2ff";
        }
    }

    document.getElementById('uploadForm').onsubmit = function() {
        document.getElementById('uploadForm').style.display = 'none';
        document.getElementById('status').style.display = 'block';
    };
</script>

</body>
</html>
