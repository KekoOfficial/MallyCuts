<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>⚔️ MallyCuts - Nivel Dios</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: #0a0a12;
            color: #f0f0f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #ffd700, #ffaa00, #ff5500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            margin-bottom: 8px;
        }

        .subtitle {
            color: #aaa;
            font-size: 1em;
            letter-spacing: 1px;
        }

        .card {
            background: linear-gradient(145deg, #1a1a2e, #10101a);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 25px rgba(255,215,0,0.15);
            border: 1px solid rgba(255,215,0,0.2);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ffd700;
            font-weight: 600;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0,0,0,0.3);
            border: 2px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255,215,0,0.2);
            outline: none;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            color: #000;
            font-size: 1.2em;
            font-weight: 900;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255,140,0,0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,140,0,0.6);
        }

        button:active {
            transform: translateY(0);
        }

        /* 📋 ESTILO DE LOS LOGS */
        .logs-container {
            background: #000;
            border: 2px solid #222;
            border-radius: 10px;
            height: 250px;
            overflow-y: auto;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            display: none; /* Oculto hasta que empiece */
        }

        .log-entry {
            margin: 5px 0;
            padding: 4px;
            border-bottom: 1px solid #111;
            line-height: 1.5;
        }

        .log-info { color: #00ff9d; }
        .log-warn { color: #ffaa00; }
        .log-error { color: #ff4444; }
        .log-success { color: #00ff00; font-weight: bold; }

        /* Estado */
        #estado {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }

        .procesando { 
            background: #2c2c00; 
            color: #ffd700; 
            border: 1px solid #ffd700;
        }
        .listo { 
            background: #004d00; 
            color: #90ee90; 
            border: 1px solid #00ff00;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scroll bonito */
        .logs-container::-webkit-scrollbar {
            width: 8px;
        }
        .logs-container::-webkit-scrollbar-track {
            background: #111;
        }
        .logs-container::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚔️ MALLYCUTS ⚔️</h1>
            <p class="subtitle">🚀 MODO DIOS ACTIVADO | ULTRA RÁPIDO | VERTICAL 1080p</p>
        </header>

        <div class="card">
            <form id="formulario">
                <div class="form-group">
                    <label>📝 Título de la Serie/Película:</label>
                    <input type="text" id="titulo" required placeholder="Ej: La Casa de Papel Temporada 1">
                </div>

                <div class="form-group">
                    <label>🎬 Archivo de Video:</label>
                    <input type="file" id="video" accept="video/*" required>
                </div>

                <div class="form-group">
                    <label>🖼️ Imagen de Portada:</label>
                    <input type="file" id="portada" accept="image/*" required>
                </div>

                <button type="submit">🔥 INICIAR PROCESO EXTREMO 🔥</button>
            </form>

            <div id="estado"></div>
        </div>

        <!-- 📡 SISTEMA DE LOGS EN VIVO -->
        <div class="card" id="card-logs" style="display:none;">
            <h3 style="color:#ffd700; margin-bottom:10px;">📡 CONSOLA DE ACTIVIDAD EN VIVO</h3>
            <div id="logs" class="logs-container"></div>
        </div>
    </div>

    <script>
        const logsDiv = document.getElementById('logs');
        const cardLogs = document.getElementById('card-logs');

        function agregarLog(mensaje, tipo = 'info') {
            const div = document.createElement('div');
            div.className = `log-entry log-${tipo}`;
            div.innerHTML = mensaje;
            logsDiv.appendChild(div);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        document.getElementById('formulario').onsubmit = async (e) => {
            e.preventDefault();

            const estado = document.getElementById('estado');
            estado.style.display = 'block';
            estado.className = 'procesando';
            estado.innerHTML = '🚀 ENVIANDO ARCHIVOS AL SERVIDOR...<br><small>⏳ Espere un momento...</small>';

            // Mostrar consola
            cardLogs.style.display = 'block';
            logsDiv.innerHTML = '';
            agregarLog('🧠 Iniciando sistema MallyCuts...', 'success');
            agregarLog('📦 Preparando para procesar video...', 'warn');

            const formData = new FormData();
            formData.append('titulo', document.getElementById('titulo').value);
            formData.append('video', document.getElementById('video').files[0]);
            formData.append('portada', document.getElementById('portada').files[0]);

            try {
                const res = await fetch('/procesar', { 
                    method: 'POST', 
                    body: formData,
                    signal: AbortSignal.timeout(60000) // Timeout de seguridad
                });
                
                const data = await res.json();

                if(data.status == 'ok'){
                    estado.className = 'listo';
                    estado.innerHTML = '✅ PROCESO INICIADO CON ÉXITO!<br><small>📡 Los logs aparecerán abajo...</small>';
                    agregarLog('✅ Archivos recibidos correctamente', 'success');
                    agregarLog('⚡ Iniciando motor de corte y envío...', 'success');
                    agregarLog('🔄 Modo velocidad máxima activado', 'warn');
                    
                    // Simular que sabemos que va a ir rápido
                    agregarLog('📌 Configuración: Ultra Fast | Partes pequeñas', 'info');
                    
                } else {
                    estado.innerHTML = '❌ ERROR: ' + data.mensaje;
                    agregarLog('❌ Error: ' + data.mensaje, 'error');
                }
            } catch (error) {
                estado.innerHTML = '📡 Error de conexión con el servidor';
                agregarLog('❌ Error de conexión: ' + error, 'error');
            }
        }

        // 💡 Mejora visual para input file
        document.querySelectorAll('input[type="file"]').forEach(input => {
            input.addEventListener('change', function(e) {
                const fileName = e.target.files[0]?.name || 'Ningún archivo seleccionado';
                agregarLog(`📄 Archivo seleccionado: ${fileName}`, 'info');
            });
        });
    </script>
</body>
</html>
